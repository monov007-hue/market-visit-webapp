<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Market Vision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=2">
  <script>window.API_URL = "http://51.159.125.188:8080:8080";</script>
</head>
<body>
 
<div class="grain"></div>
 
<div class="app">
 
  <!-- HEADER -->
  <header class="header">
    <div class="logo-wrap">
      <!-- SVG логотип MV -->
      <svg class="logo-svg" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="13" fill="#1C3557"/>
        <!-- Тележка -->
        <path d="M10 14h3.5l4.5 13h12l3-9H15.5" stroke="#B8924A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <!-- Колёса -->
        <circle cx="21" cy="30.5" r="1.5" fill="#B8924A"/>
        <circle cx="30" cy="30.5" r="1.5" fill="#B8924A"/>
        <!-- Линза (vision) -->
        <circle cx="35" cy="16" r="5" stroke="white" stroke-width="1.8"/>
        <line x1="39" y1="20" x2="42" y2="23" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
 
      <div class="logo-text">
        <div class="logo-title">Market Vision</div>
        <div class="logo-sub">Анализ товаров · ИИ</div>
      </div>
    </div>
    <div class="header-rule"></div>
  </header>
 
  <!-- ГАЛЕРЕЯ -->
  <section class="gallery-section">
    <div class="gallery-header">
      <span class="gallery-label">Последние фото из чата</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadChatPhotos()" aria-label="Обновить">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>
 
    <div id="chatGallery" class="gallery-grid">
      <div class="gallery-empty" id="galleryEmpty">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg" class="gallery-empty-icon">
          <rect x="4" y="8" width="32" height="24" rx="3" stroke="currentColor" stroke-width="1.5"/>
          <circle cx="14" cy="18" r="3" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 28l7-6 5 5 5-4 7 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>Фото из чата появятся здесь</span>
      </div>
    </div>
  </section>
 
  <!-- КНОПКА ЗАГРУЗКИ (скрывается когда показано превью) -->
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
    <button class="pick-btn" id="pickBtn" onclick="openPicker()">
      <svg class="pick-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="15" stroke="white" stroke-width="1.5" opacity="0.3"/>
        <path d="M16 9v14M9 16h14" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span class="pick-label">Выбрать фото</span>
      <span class="pick-hint">Анализ начнётся автоматически</span>
    </button>
  </div>
 
  <!-- ПРЕВЬЮ + ПРОГРЕСС (скрыто по умолчанию) -->
  <div class="preview-zone hidden" id="previewZone">
    <div class="preview-frame">
      <img id="previewImg" class="preview-img" alt="превью">
      <div class="preview-veil" id="previewVeil">
        <div class="ring-spinner"></div>
        <span class="veil-label" id="veilLabel">Анализирую...</span>
      </div>
    </div>
    <div class="status-line" id="statusLine"></div>
  </div>
 
  <!-- РЕЗУЛЬТАТ -->
  <div class="result-card hidden" id="resultCard">
    <div class="result-top">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="7" stroke="#2D6A4F" stroke-width="1.5"/>
        <path d="M5 8l2 2 4-4" stroke="#2D6A4F" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Распознано</span>
    </div>
 
    <div class="result-body">
      <div class="result-row">
        <span class="r-label">Название</span>
        <span class="r-val" id="resName">—</span>
      </div>
      <div class="r-sep"></div>
      <div class="result-row">
        <span class="r-label">Бренд</span>
        <span class="r-val" id="resBrand">—</span>
      </div>
      <div class="r-sep"></div>
      <div class="result-row">
        <span class="r-label">Категория</span>
        <span class="r-val" id="resCategory">—</span>
      </div>
    </div>
 
    <button class="next-btn" onclick="resetUI()">Следующее фото →</button>
  </div>
 
</div><!-- .app -->
 
<script src="app.js?v=2"></script>
</body>
</html>
