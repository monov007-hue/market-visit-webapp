<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Market Vision</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="header">
    <div class="logo-block">
      <div class="logo-icon">
        <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="44" height="44" rx="12" fill="url(#lg)"/>
          <defs>
            <linearGradient id="lg" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
              <stop stop-color="#4AAFF5"/>
              <stop offset="1" stop-color="#1A7FD4"/>
            </linearGradient>
          </defs>
          <!-- Cart -->
          <path d="M10 13h3l3.5 10H30l2.5-7H16" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="21" cy="27" r="1.4" fill="white"/>
          <circle cx="29" cy="27" r="1.4" fill="white"/>
          <!-- Lens -->
          <circle cx="33" cy="14" r="4" stroke="white" stroke-width="1.6"/>
          <line x1="36.8" y1="17.8" x2="39.5" y2="20.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text">
        <div class="logo-title">Market Vision</div>
        <div class="logo-sub">Анализ товаров · ИИ</div>
      </div>
    </div>
  </header>

  <!-- ГАЛЕРЕЯ -->
  <section class="section">
    <div class="section-row">
      <span class="section-title">Последние фото из чата</span>
      <button class="icon-btn" id="refreshBtn" onclick="loadChatPhotos()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 4v6h6"/><path d="M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
      </button>
    </div>

    <div class="gallery-scroll" id="chatGallery">
      <!-- плейсхолдеры пока грузится -->
      <div class="gallery-placeholder"></div>
      <div class="gallery-placeholder"></div>
      <div class="gallery-placeholder"></div>
      <div class="gallery-placeholder"></div>
    </div>
  </section>

  <!-- ПРЕВЬЮ (скрыто по умолчанию) -->
  <div class="preview-zone hidden" id="previewZone">
    <div class="preview-frame">
      <img id="previewImg" class="preview-img" alt="">
      <div class="preview-veil hidden" id="previewVeil">
        <div class="ring-spinner"></div>
        <span class="veil-text" id="veilLabel">Анализирую...</span>
      </div>
    </div>
    <p class="status-text" id="statusLine"></p>
  </div>

  <!-- ЗАГРУЗКА / ПУСТОЕ СОСТОЯНИЕ -->
  <div class="upload-card" id="uploadCard">
    <div class="upload-card-inner">
      <svg class="upload-icon" viewBox="0 0 48 48" fill="none">
        <circle cx="24" cy="24" r="20" fill="#E8F4FD"/>
        <path d="M17 24h14M24 17v14" stroke="#4A9FE0" stroke-width="2.5" stroke-linecap="round"/>
      </svg>
      <span class="upload-card-text" id="uploadCardText">Нажмите кнопку ниже,<br>чтобы выбрать фото</span>
    </div>
  </div>

  <!-- РЕЗУЛЬТАТ -->
  <div class="result-card hidden" id="resultCard">
    <div class="result-success">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="8" fill="#34C759"/>
        <path d="M5.5 9l2.5 2.5 4.5-5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Товар распознан
    </div>
    <div class="result-rows">
      <div class="result-row">
        <span class="r-key">Название</span>
        <span class="r-val" id="resName">—</span>
      </div>
      <div class="r-line"></div>
      <div class="result-row">
        <span class="r-key">Бренд</span>
        <span class="r-val" id="resBrand">—</span>
      </div>
      <div class="r-line"></div>
      <div class="result-row">
        <span class="r-key">Категория</span>
        <span class="r-val" id="resCategory">—</span>
      </div>
    </div>
  </div>

  <!-- КНОПКА -->
  <div class="btn-zone">
    <input type="file" id="fileInput" accept="image/*" capture="environment" hidden>
    <button class="pick-btn" id="pickBtn" onclick="openPicker()">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="10" stroke="white" stroke-width="1.8" opacity="0.5"/>
        <path d="M11 6v10M6 11h10" stroke="white" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <span id="pickBtnLabel">Выбрать фото</span>
    </button>
  </div>

  <div class="bot-name">@MarketVisit_SV_bot</div>

</div>

<script src="app.js?v=3"></script>
</body>
</html>
